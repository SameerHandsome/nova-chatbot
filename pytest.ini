[pytest]
asyncio_mode = auto

# Test discovery paths
testpaths = tests evals

# File and class patterns
python_files   = test_*.py eval_*.py
python_classes = Test*
python_functions = test_*

# Default flags: verbose + short traceback
addopts = -v --tb=short

# ── Custom markers ─────────────────────────────────────────────────────────────
# eval tests hit real Groq API and cost tokens — exclude from CI by default.
#
# Run unit + integration only (CI):
#   pytest -m "not eval"
#
# Run evals only (manual):
#   pytest evals/ -m eval -s
#
# Run everything:
#   pytest
markers =
    eval: LLM evaluation tests — require real API keys and cost tokens (deselect with -m "not eval")
    integration: Integration tests — require app running + mocked external services
    unit: Pure unit tests — no external calls, fast