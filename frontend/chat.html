<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat — NOVA</title>
<link rel="stylesheet" href="/css/base.css" />
<link rel="stylesheet" href="/css/chat.css" />
</head>
<body>
<script type="module" src="/js/auth-guard.js"></script>

<div class="chat-layout">
  <div class="chat-area" id="chatArea">
    
    <div class="top-controls">
      <button id="endSessionBtn" class="btn btn-danger btn-sm" style="display:none;">
        ⏹ Stop Session
      </button>
    </div>

    <div class="welcome" id="welcomeScreen">
      <span class="welcome-icon">✦</span>
      <h2>Multimodal Intelligence</h2>
      <p>Send text, images, or voice — or any combination. NOVA understands everything.</p>
      <div class="cap-pills">
        <span class="cap-pill c-text">⌨ Text</span>
        <span class="cap-pill c-image">🖼 Image</span>
        <span class="cap-pill c-audio">🎤 Voice</span>
      </div>
    </div>
  </div>

  <div class="input-panel-wrap">
    <div class="input-panel">
      <div class="preview-row" id="previewRow" style="display:none"></div>
      <div class="input-row">
        <button class="tool-btn" id="imgBtn" title="Attach image">🖼</button>
        <input type="file" id="imageInput" accept="image/*" style="display:none" />
        <button class="tool-btn" id="audioBtn" title="Record voice">🎤</button>
        <div class="text-wrap">
          <textarea class="text-input" id="textInput" rows="1"
            placeholder="Type, attach an image, or record your voice…"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" title="Send">➤</button>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="hint-bar">
          <span>Enter to send</span>
          <span>Shift+Enter for newline</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="/js/chat.js"></script>
</body>
</html>
