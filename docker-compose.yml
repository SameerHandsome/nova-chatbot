version: "3.9"

services:
  api:
    build:
      context:    .
      dockerfile: Dockerfile
      target:     runtime
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=development
    volumes:
      # Hot-reload backend in dev without rebuilding image
      - ./backend:/app/backend:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout:  10s
      retries:  3